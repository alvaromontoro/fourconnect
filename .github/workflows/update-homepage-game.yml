name: Update Homepage Game

on:
  workflow_dispatch:
  push:
    paths:
      - 'games/**/data.json'
  schedule:
    - cron: '17 1 * * *'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Update index.html from latest game
        run: python3 bin/update-index-from-latest-game.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain --untracked-files=normal -- index.html archive.html sitemap.xml sitemap.html rss.xml rss)" ]; then
            echo "No homepage, archive, sitemap, or RSS changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive.html sitemap.xml sitemap.html rss.xml rss
          git commit -m "chore: update homepage, archive, sitemaps, and rss"
          git push